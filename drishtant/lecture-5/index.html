<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img  height="100" src="image.png.jpg" alt="car">

    <table>
        <!--head-> body -> foot-> in table -->
        <caption>student details </caption>
        <tr>
            <th>name</th>
            <th>class</th>
            <th>section</th>
        </tr>
        <tr> 
            <td colspan ="2"> ram</td>
            <td rowspan="2">4th</td>
            <td>A</td>
        </tr>
    </table>

  <!--List-->  
  <!--1. unorder list (ul)
      2. ordered list (ol)
      3. Definition list (dl)-->
       unorder list
      <ul type = "square">
        <li>name</li>
        <li>class</li>
        <li>section</li>
      </ul>
        ordered list
      <ol type="A">
        <li>name</li>
        <li>class</li>
        <li>section</li>
      </ol>
       Definition list

      <li>name</li>
        <li>class</li>
        <li>section</li>
      </dl>

      
</body>
</html>
